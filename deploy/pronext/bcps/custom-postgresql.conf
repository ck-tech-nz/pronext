# shared_buffers = 2GB
# work_mem = 16MB
# max_connections = 100
# effective_cache_size = 4GB
# password_encryption = 'scram-sha-256'  # 强制用 scram 加密密码

shared_buffers = 3GB  # 保持（缓存多，帮 SSD 命中）
work_mem = 64MB  # 加大到 64MB，帮大查询用内存代替 CPU 排序（从 48MB；总潜力 5.12GB <6GiB 安全）
maintenance_work_mem = 1GB  # 加大到 1GB，帮维护任务快点（防 vacuum 吃 CPU）
max_connections = 80  # 回到 80（从 50）。Django 侧已经上 psycopg3 in-process pool
                      # (OPTIONS.pool max_size=6 per worker)。6 worker × 6 = 36 + celery
                      # 3 + 维护余量 = ~45 峰值；80 给出充足 headroom 并防运维脚本挤爆。
                      # work_mem 64MB × 80 = 5.12GB，在 6GB mem_limit 内安全。
effective_cache_size = 6GB  # 保持
password_encryption = 'scram-sha-256'  # 无需改

# 新加 SSD 优化（重要！减 CPU 等 IO 时间）
random_page_cost = 1.1  # 低值适合 SSD（默认4；降低后规划器更爱用索引/顺序扫描）
seq_page_cost = 1.0  # 匹配 SSD 快

# 新加 CPU 防峰值
parallel_setup_cost = 0.0  # 鼓励并行查询（用多核分担，您的6vCPU 完美）
max_parallel_workers = 8  # 加大并行 worker（从默认，帮分担 CPU；别超 vCPU）
max_parallel_workers_per_gather = 4  # 每个查询用4 worker
cpu_tuple_cost = 0.03  # 略高，帮 CPU 密集查询优化计划

# WAL / checkpoint / 统计（原来散落在 pg17/pg18 的 command 行里，统一到 conf）
checkpoint_completion_target = 0.9  # checkpoint 平滑分摊，减 IO 峰值
wal_buffers = 16MB                   # 批量写 WAL，降低高并发 fsync 压力
default_statistics_target = 100      # 默认即 100，显式写出来做 source of truth

# 监听所有网卡 —— 关键！PG 默认 listen_addresses=localhost，docker 镜像
# entrypoint 会改 $PGDATA/postgresql.conf 但我们用 -c config_file 指向了
# 这个文件，所以必须在这里显式设，否则外部/容器 bridge 都连不进来
listen_addresses = '*'
