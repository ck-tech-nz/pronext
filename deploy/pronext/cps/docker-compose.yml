services:
  api:
    image: registry.cktech.co.nz/pronext/pronext-prod
    container_name: pronext
    networks:
      - traefik
    volumes:
      - ./pronext/logs:/app/logs
    env_file:
      - .env
    # environment:
    #  - ASGI_THREADS=8
    # command: gunicorn pronext_server.asgi:application -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8888 --access-logfile - 平时没有必要开 access-log 因为有大量的心跳信号，开了也没有用
    # WSGI gthread: bounded thread count to avoid ASGI's unbounded thread growth.
    #   With ASGI + uvicorn + sync_to_async, thread count grew ~45 threads/sec
    #   per worker unbounded (starting at ~50, reaching 800+ in 60s) regardless
    #   of whether Sentry was enabled — GIL contention starved requests.
    # -w 4 --threads 16: 4 workers × 16 threads = 64 concurrent request capacity.
    # --timeout 120: prevent spurious worker kills during slow requests.
    # --max-requests 1000/jitter 100: recycle workers periodically.
    command: gunicorn pronext_server.wsgi:application -w 6 --threads 12 --timeout 120 --max-requests 1000 --max-requests-jitter 100 -b 0.0.0.0:8888 --access-logfile -
    # 同步视图用 WSGI，连接数精确可控: 4 workers × 2 threads = 最多 8 个 DB 连接
    # command: gunicorn pronext_server.wsgi:application -w 6 --threads 3 --timeout 120 --max-requests 1000 --max-requests-jitter 50 -b 0.0.0.0:8888
    restart: always
      #depends_on:
      #- pgbouncer
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.http.services.django.loadbalancer.server.port=8888
      # Route all API traffic EXCEPT heartbeat to Django
      - traefik.http.routers.django.service=django
      - traefik.http.routers.django.entrypoints=web,websecure
      - traefik.http.routers.django.rule=Host(`api.pronextusa.com`) && !PathPrefix(`/go-api/`) && !PathPrefix(`/tools-api/`) && !Path(`/pad-api/common/heartbeat`) && !Path(`/pad-api/common/heartbeat/`)
        #- traefik.http.routers.django.rule=Host(`api.pronextusa.com`)
      - traefik.http.routers.django.tls=true
      # Admin site
      - traefik.http.routers.admin.service=django
      - traefik.http.routers.admin.entrypoints=web,websecure
      - traefik.http.routers.admin.rule=Host(`admin.pronextusa.com`)
      - traefik.http.routers.admin.tls=true


  # 2. celery worker
  celeryworker:
    image: registry.cktech.co.nz/pronext/pronext-prod
    container_name: pronext-celeryworker
    volumes:
      - ./pronext/logs:/app/logs
    networks:
      - traefik
    env_file:
      - .env
    # command: celery -A pronext_server worker -l info -E
    command: celery -A pronext_server worker -l info -E --concurrency 2
    restart: always
    depends_on:
      - api
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # 3. celery beat
  celerybeat:
    image: registry.cktech.co.nz/pronext/pronext-prod
    container_name: pronext-celerybeat
    volumes:
      - ./pronext/logs:/app/logs
    networks:
      - traefik
    env_file:
      - .env
    command: celery -A pronext_server beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: always
    depends_on:
      - api
    labels:
      - com.centurylinklabs.watchtower.enable=true


  pgbouncer:
    #image: bitnami/pgbouncer
    image: registry.cktech.co.nz/images/pgbouncer
    container_name: pg_bouncer
    environment:
      # pgbouncer now fronts Cloud SQL instead of the unused local pg17.
      # This caps Cloud SQL server connections at DEFAULT_POOL_SIZE regardless
      # of how many client connections Django opens locally.
      - POSTGRESQL_HOST=34.71.133.22
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_DATABASE=pronext_backup_20260410_192940
      # PG Settings
      - PGBOUNCER_DATABASE=pronext_backup_20260410_192940
      - PGBOUNCER_POOL_MODE=transaction
      - PGBOUNCER_MAX_CLIENT_CONN=4000
      # POOL_SIZE=200 (down from 400): Cloud SQL's SCRAM-SHA-256 auth can't
      # keep up with 400 simultaneous new-connection bursts (Django restart storms),
      # causing server_connect_timeout → server_login_retry backoff spirals.
      # 200 is enough for normal steady-state (we saw sv_active peak ~60-80 earlier).
      - PGBOUNCER_DEFAULT_POOL_SIZE=200
      - PGBOUNCER_RESERVE_POOL_SIZE=50
      - PGBOUNCER_MIN_POOL_SIZE=20
      # Default 15s server_connect_timeout caused backoff storms during reconnect bursts.
      # Raise to 60s so slow TLS/auth under load doesn't kick pgbouncer into retry mode.
      - PGBOUNCER_SERVER_CONNECT_TIMEOUT=60
      # After a server login failure, retry after 5s instead of default 15s.
      - PGBOUNCER_SERVER_LOGIN_RETRY=5
      - PGBOUNCER_SERVER_IDLE_TIMEOUT=30  # 更快关闭闲置

      # trust: skip SCRAM-SHA-256 on the client side (Django → pgbouncer).
      # pgbouncer is only reachable on the private traefik docker network
      # (no exposed port), so local trust is safe. pgbouncer still authenticates
      # to Cloud SQL upstream with scram-sha-256 using POSTGRESQL_PASSWORD.
      # scram-sha-256 had been the client auth, but under Django restart bursts
      # the single-threaded pgbouncer couldn't keep up — 1000+ concurrent SCRAM
      # negotiations bottlenecked pgbouncer's CPU, causing client_login_timeout
      # and "failed to send welcome message" storms.
      - PGBOUNCER_AUTH_TYPE=trust
      # https://hub.docker.com/r/bitnami/pgbouncer
      - PGBOUNCER_SERVER_LIFETIME=600
      # - PGBOUNCER_SERVER_IDLE_TIMEOUT=60
    restart: always
    # ports:
    #   - 6432:6432
    networks:
        - traefik

networks:
    traefik:
        external: true
        name: traefik
